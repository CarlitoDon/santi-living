# Nixpacks configuration for Puppeteer Support
# This installs Chrome/Chromium and necessary shared libraries

[phases.setup]
nixPkgs = [
    "nodejs_18",
    "npm",
    "chromium",
    "glib",
    "nss",
    "nspr",
    "atk",
    "cups",
    "dbus",
    "libdrm",
    "gtk3",
    "pango",
    "cairo",
    "at-spi2-atk",
    "at-spi2-core",
    "alsa-lib",
    "mesa",
    "libxkbcommon",
    "xorg.libX11",
    "xorg.libXcomposite",
    "xorg.libXdamage",
    "xorg.libXext",
    "xorg.libXfixes",
    "xorg.libXrandr",
    "xorg.libxcb"
]

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/usr/bin/chromium"

[phases.build]
cmds = ["npm install && npm run build"]

[start]
cmd = "npm run start"
