name: Deploy API Proxy

on:
  push:
    branches: [main, dev]
    paths:
      - apps/proxy/**

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Install and Build Proxy
        working-directory: apps/proxy
        run: |
          npm ci
          npm run build

      - name: Deploy to Railway
        # Run from repository root so the uploaded archive still contains the
        # `apps/proxy` directory. Railway service root is configured as
        # `/apps/proxy`, so running `railway up` from inside `apps/proxy`
        # made Railway look for `/apps/proxy` inside the archive and fail.
        run: railway up --service proxy
        env:
          RAILWAY_TOKEN: ${{ github.ref == 'refs/heads/dev' && secrets.RAILWAY_TOKEN_STAGING || secrets.RAILWAY_TOKEN }}
