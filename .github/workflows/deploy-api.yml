name: Deploy API Proxy

on:
  push:
    branches: [main, dev]
    paths:
      - apps/proxy/**

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Install and Build Proxy
        working-directory: apps/proxy
        run: |
          npm ci
          npm run build

      - name: Skip Railway deploy (handled by Railway)
        working-directory: apps/proxy
        run: |
          echo "Skipping 'railway up --service proxy' — Railway auto-deploy handles this."
        env:
          RAILWAY_TOKEN: ${{ github.ref == 'refs/heads/dev' && secrets.RAILWAY_TOKEN_STAGING || secrets.RAILWAY_TOKEN }}
