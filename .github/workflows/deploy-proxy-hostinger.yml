name: Deploy Proxy to Hostinger

on:
  push:
    branches: [main]
    paths:
      - "apps/proxy/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/proxy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build Proxy
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 65002 ${{ secrets.HOSTINGER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Hostinger
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
          SSH_PASSPHRASE: ${{ secrets.HOSTINGER_SSH_PASSPHRASE }}
        run: |
          eval $(ssh-agent -a $SSH_AUTH_SOCK)

          # Create dummy askpass script to handle passphrase
          echo 'echo "$SSH_PASSPHRASE"' > ~/.ssh/askpass
          chmod +x ~/.ssh/askpass

          export SSH_ASKPASS=~/.ssh/askpass
          export DISPLAY=:0 # Needed for some ssh versions to trigger askpass

          # Use expect-style approach via setsid
          setsid -w ssh-add ~/.ssh/id_ed25519 < /dev/null

          # Upload files
          rsync -avz --delete \
            --exclude='node_modules' \
            -e "ssh -p 65002 -o StrictHostKeyChecking=no" \
            dist/ ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:~/public_html/apps/proxy/dist/

          rsync -avz \
            -e "ssh -p 65002 -o StrictHostKeyChecking=no" \
            package.json ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:~/public_html/apps/proxy/

          # Install dependencies and restart
          ssh -p 65002 -o StrictHostKeyChecking=no ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} << 'EOF'
            export PATH=/opt/alt/alt-nodejs20/root/usr/bin:$PATH
            cd ~/public_html/apps/proxy
            rm -rf node_modules
            npm install --production
            touch tmp/restart.txt 2>/dev/null || true
          EOF
