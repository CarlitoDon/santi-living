name: CI

on:
  pull_request:
  push:
    branches: [dev, main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Turbo)
        run: npx turbo run build

      - name: Lint (Turbo)
        run: npx turbo run lint

      - name: Typecheck (Turbo)
        run: npx turbo run typecheck

      - name: Test
        run: npm run test
